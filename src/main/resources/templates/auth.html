<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Belfort Strategy Lab - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 2rem; background: #fff; }
        .nav-pills .nav-link { border-radius: 8px; font-weight: 600; color: #6c757d; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: #fff; }
        .form-control { border-radius: 8px; padding: 0.75rem 1rem; }
        .btn-auth { border-radius: 8px; font-weight: 600; padding: 0.75rem; width: 100%; }
    </style>
</head>
<body>

<div class="auth-card">
    <h3 class="text-center mb-4 fw-bold text-primary">Belfort Lab</h3>

    <ul class="nav nav-pills nav-justified mb-4" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login" type="button" role="tab">Login</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register" type="button" role="tab">Register</button>
        </li>
    </ul>

    <div class="tab-content" id="authTabsContent">
        <!-- Panel logowania -->
        <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form id="loginForm" onsubmit="handleAuth(event, '/api/auth/login')">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" id="login-username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-auth">Sign In</button>
            </form>
        </div>

        <!-- Panel rejestracji -->
        <div class="tab-pane fade" id="register" role="tabpanel">
            <form id="registerForm" onsubmit="handleAuth(event, '/api/auth/register')">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" id="reg-username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark btn-auth">Create Account</button>
            </form>
        </div>
    </div>
    <div id="auth-error" class="text-danger mt-3 text-center fw-semibold" style="display: none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Pełny adres URL backendu eliminuje problem wysyłania zapytań pod lokalną ścieżkę pliku html.
    // Zmiana zapobiega również błędom przekierowań 302, które przeglądarka automatycznie zamienia z POST na GET.
    const API_BASE_URL = 'http://localhost:8080';

    async function handleAuth(event, endpoint) {
        // Blokada domyślnego wysłania formularza, które przeglądarka realizuje jako żądanie GET
        event.preventDefault();

        const isLogin = endpoint.includes('login');
        const prefix = isLogin ? 'login' : 'reg';

        const payload = {
            username: document.getElementById(`${prefix}-username`).value,
            password: document.getElementById(`${prefix}-password`).value
        };

        if (!isLogin) {
            payload.email = document.getElementById('reg-email').value;
        }

        try {
            const fullUrl = API_BASE_URL + endpoint;

            const response = await fetch(fullUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();

                // Sprawdzenie czy backend faktycznie zwraca token
                if (data && data.jwt) {
                    localStorage.setItem('jwt', data.jwt);
                }

                localStorage.setItem('username', payload.username);
                window.location.href = 'index.html';
            } else {
                document.getElementById('auth-error').innerText = "Authentication failed. Please check your credentials.";
                document.getElementById('auth-error').style.display = 'block';
            }
        } catch (error) {
            console.error("Auth error:", error);
            document.getElementById('auth-error').innerText = "Network error. Cannot reach the server.";
            document.getElementById('auth-error').style.display = 'block';
        }
    }
</script>
</body>
</html>
